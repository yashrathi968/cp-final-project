<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Study Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .gradient-bg { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    
    <nav class="gradient-bg p-6 text-white shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold italic"><i class="fas fa-brain mr-2"></i>StudyFlow AI</h1>
            <span class="text-sm opacity-80">v2.0 - Academic Productivity Suite</span>
        </div>
    </nav>

    <div class="container mx-auto px-4 py-10 grid grid-cols-1 lg:grid-cols-3 gap-8">
        
        <div class="lg:col-span-1">
            <div class="glass-card p-6 rounded-2xl shadow-xl border border-gray-200">
                <h2 class="text-xl font-bold text-gray-800 mb-6 border-b pb-2">Add New Subject</h2>
                
                <form id="subjectForm" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Subject Name</label>
                        <input type="text" id="subName" required 
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border focus:ring-indigo-500 focus:border-indigo-500" 
                               placeholder="e.g. Quantum Physics">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700">Exam Date</label>
                        <input type="date" id="subDate" required 
                               class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Confidence (1-10)</label>
                            <input type="range" id="subConf" min="1" max="10" value="5" class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer mt-4">
                            <div class="text-center text-xs text-gray-500 mt-1" id="confVal">Level: 5</div>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700">Weightage (1-5)</label>
                            <select id="subWeight" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm p-3 border">
                                <option value="1">Low (1)</option>
                                <option value="3">Medium (3)</option>
                                <option value="5">High (5)</option>
                            </select>
                        </div>
                    </div>

                    <button type="submit" class="w-full gradient-bg text-white font-bold py-3 px-4 rounded-lg hover:opacity-90 transition duration-300 transform hover:scale-105">
                        <i class="fas fa-plus-circle mr-2"></i> Add Subject
                    </button>
                </form>
            </div>
        </div>

        <div class="lg:col-span-2 space-y-8">
            
            <div class="bg-white p-6 rounded-2xl shadow-xl border-l-8 border-indigo-500">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-xl font-bold text-gray-800">
                        <i class="fas fa-magic text-indigo-500 mr-2"></i> AI Optimized Study Sequence
                    </h2>
                    <button onclick="loadPlan()" class="text-indigo-600 hover:underline text-sm font-semibold">
                        <i class="fas fa-sync-alt mr-1"></i> Refresh AI
                    </button>
                </div>
                
                <div id="aiPlanOutput" class="space-y-4">
                    <div class="text-gray-400 text-center py-10 italic">Add subjects to see your AI-generated roadmap...</div>
                </div>
            </div>

            <div class="bg-white p-6 rounded-2xl shadow-md overflow-hidden">
                <h3 class="text-lg font-semibold mb-4">Course Tracking</h3>
                <div class="overflow-x-auto">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Subject</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Exam Date</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Weight</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Action</th>
                            </tr>
                        </thead>
                        <tbody id="subjectTableBody" class="bg-white divide-y divide-gray-200 text-sm">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Update range label
        document.getElementById('subConf').addEventListener('input', (e) => {
            document.getElementById('confVal').innerText = `Level: ${e.target.value}`;
        });

        // Add Subject via API
        document.getElementById('subjectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const payload = {
                name: document.getElementById('subName').value,
                date: document.getElementById('subDate').value,
                confidence: document.getElementById('subConf').value,
                weightage: document.getElementById('subWeight').value
            };

            const resp = await fetch('/api/subjects', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });

            if (resp.ok) {
                location.reload(); // Simple refresh to update table
            }
        });

        // Load AI Plan
        async function loadPlan() {
            const resp = await fetch('/api/generate-plan');
            const plan = await resp.json();
            const container = document.getElementById('aiPlanOutput');
            
            if (plan.length === 0) return;

            container.innerHTML = plan.map((item, index) => `
                <div class="flex items-center justify-between p-4 ${index === 0 ? 'bg-indigo-50 border border-indigo-200' : 'bg-gray-50'} rounded-xl transition hover:shadow-md">
                    <div class="flex items-center space-x-4">
                        <div class="text-2xl font-bold ${index === 0 ? 'text-indigo-600' : 'text-gray-400'}">#${index + 1}</div>
                        <div>
                            <h4 class="font-bold text-gray-800">${item.name}</h4>
                            <p class="text-xs text-gray-500">Days to Exam: ${item.days_left} | Priority: 
                                <span class="px-2 py-0.5 rounded text-white ${item.priority_level === 'High' ? 'bg-red-400' : 'bg-blue-400'}">
                                    ${item.priority_level}
                                </span>
                            </p>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-lg font-mono font-bold text-indigo-700">${item.suggested_hours} hrs</div>
                        <div class="text-[10px] text-gray-400 uppercase tracking-widest">Daily Goal</div>
                    </div>
                </div>
            `).join('');
        }

        // Delete Subject
        async function deleteSub(id) {
            if(confirm('Remove this subject?')) {
                await fetch(`/api/delete/${id}`, { method: 'DELETE' });
                location.reload();
            }
        }

        // Initialize table content (Server-side rendered data could also be fetched here)
        window.onload = () => {
            loadPlan();
            // Fetch initial table if not using Jinja loops fully
        };
    </script>
</body>
</html>
